[variables]
    UPLOAD_MAX_FILESIZE = '100M'
    POST_MAX_SIZE = '100M'

[phases.setup]
    nixPkgs = ['...', 'python311Packages.supervisor', 'php82Extensions.redis', 'php82Extensions.pdo_mysql']
    cmds = ['UPLOAD_INI_PATH=$(find /nix/store/*-php-*/lib -name php.ini -print0 | tail -z -n 1 | rev | cut -c 9- | rev)/upload.ini; echo "upload_max_filesize=${UPLOAD_MAX_FILESIZE};" >> $UPLOAD_INI_PATH; echo "post_max_size=${POST_MAX_SIZE};" >> $UPLOAD_INI_PATH']

[start]
    # Matamos cualquier proceso PHP previo por la fuerza (-9) y borramos el socket si existe
    cmd = "pkill -9 php-fpm || true && rm -rf /run/php-fpm.sock || true && node /assets/scripts/prestart.mjs /app/nginx.template.conf /nginx.conf && supervisord -c /app/supervisord.conf"